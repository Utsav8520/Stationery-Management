<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1250" viewBox="0 0 1900 1250" role="img" aria-labelledby="title desc">
  <title id="title">Store Platform Level 2 DFD</title>
  <desc id="desc">Clean Level 2 data flow diagram for the store platform with separated lanes for Admin, Customer, Rider, Khalti, six decomposed processes, and six data stores.</desc>
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .entity-label { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .group-title { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subproc { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .store-label { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #5b4110; }
      .line-label { font: 12px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .entity { fill: #eef2f7; stroke: #475569; stroke-width: 2; rx: 14; ry: 14; }
      .group { fill: #f8fbff; stroke: #2563eb; stroke-width: 2.2; rx: 22; ry: 22; }
      .subbox { fill: #ffffff; stroke: #93c5fd; stroke-width: 1.3; rx: 13; ry: 13; }
      .store { fill: #fff4cf; stroke: #d4a72c; stroke-width: 1.8; rx: 12; ry: 12; }
      .flow { fill: none; stroke: #1f2937; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .store-flow { fill: none; stroke: #475569; stroke-width: 2.1; stroke-linecap: round; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
  </defs>

  <rect width="1900" height="1250" fill="#ffffff"/>
  <text x="950" y="50" text-anchor="middle" class="title">Store Platform Level 2 Data Flow Diagram</text>
  <text x="950" y="76" text-anchor="middle" class="subtitle">Cleaned from the Level 1 reference with fixed lanes, grouped subprocesses, and simplified non-overlapping flows</text>

  <rect x="825" y="88" width="250" height="74" class="entity"/>
  <text x="950" y="132" text-anchor="middle" class="entity-label">Admin</text>

  <rect x="40" y="508" width="220" height="74" class="entity"/>
  <text x="150" y="552" text-anchor="middle" class="entity-label">Customer</text>

  <rect x="1640" y="508" width="220" height="74" class="entity"/>
  <text x="1750" y="552" text-anchor="middle" class="entity-label">Rider</text>

  <rect x="815" y="1088" width="270" height="74" class="entity"/>
  <text x="950" y="1132" text-anchor="middle" class="entity-label">Khalti Payment Gateway</text>

  <rect x="330" y="205" width="360" height="180" class="group"/>
  <text x="510" y="235" text-anchor="middle" class="group-title">2.1 User &amp; Authentication</text>
  <rect x="362" y="255" width="296" height="32" class="subbox"/>
  <text x="510" y="276" text-anchor="middle" class="subproc">2.1.1 Register / Login / Logout</text>
  <rect x="362" y="299" width="296" height="32" class="subbox"/>
  <text x="510" y="320" text-anchor="middle" class="subproc">2.1.2 Validate Profile, Role &amp; Age</text>
  <rect x="362" y="343" width="296" height="32" class="subbox"/>
  <text x="510" y="364" text-anchor="middle" class="subproc">2.1.3 Maintain User Accounts</text>

  <rect x="330" y="405" width="360" height="52" class="store"/>
  <text x="510" y="437" text-anchor="middle" class="store-label">D1 - User Data</text>

  <rect x="770" y="205" width="360" height="180" class="group"/>
  <text x="950" y="235" text-anchor="middle" class="group-title">2.2 Product &amp; Stock</text>
  <rect x="802" y="255" width="296" height="32" class="subbox"/>
  <text x="950" y="276" text-anchor="middle" class="subproc">2.2.1 Maintain Catalog &amp; Categories</text>
  <rect x="802" y="299" width="296" height="32" class="subbox"/>
  <text x="950" y="320" text-anchor="middle" class="subproc">2.2.2 Update Stock &amp; Images</text>
  <rect x="802" y="343" width="296" height="32" class="subbox"/>
  <text x="950" y="364" text-anchor="middle" class="subproc">2.2.3 Search / Filter / View Product</text>

  <rect x="770" y="405" width="360" height="52" class="store"/>
  <text x="950" y="437" text-anchor="middle" class="store-label">D2 - Product &amp; Stock Data</text>

  <rect x="1210" y="205" width="360" height="180" class="group"/>
  <text x="1390" y="235" text-anchor="middle" class="group-title">2.5 Delivery &amp; Riders</text>
  <rect x="1242" y="255" width="296" height="32" class="subbox"/>
  <text x="1390" y="276" text-anchor="middle" class="subproc">2.5.1 Create Delivery Request</text>
  <rect x="1242" y="299" width="296" height="32" class="subbox"/>
  <text x="1390" y="320" text-anchor="middle" class="subproc">2.5.2 Assign / Reassign Rider</text>
  <rect x="1242" y="343" width="296" height="32" class="subbox"/>
  <text x="1390" y="364" text-anchor="middle" class="subproc">2.5.3 Update Delivery Status</text>

  <rect x="1210" y="405" width="360" height="52" class="store"/>
  <text x="1390" y="437" text-anchor="middle" class="store-label">D5 - Delivery &amp; Rider Data</text>

  <rect x="330" y="610" width="360" height="180" class="group"/>
  <text x="510" y="640" text-anchor="middle" class="group-title">2.3 Cart &amp; Orders</text>
  <rect x="362" y="660" width="296" height="32" class="subbox"/>
  <text x="510" y="681" text-anchor="middle" class="subproc">2.3.1 Add / Update / Remove Cart</text>
  <rect x="362" y="704" width="296" height="32" class="subbox"/>
  <text x="510" y="725" text-anchor="middle" class="subproc">2.3.2 Validate Checkout &amp; Address</text>
  <rect x="362" y="748" width="296" height="32" class="subbox"/>
  <text x="510" y="769" text-anchor="middle" class="subproc">2.3.3 Create Order &amp; Confirmation</text>

  <rect x="330" y="810" width="360" height="52" class="store"/>
  <text x="510" y="842" text-anchor="middle" class="store-label">D3 - Cart &amp; Order Data</text>

  <rect x="770" y="610" width="360" height="180" class="group"/>
  <text x="950" y="640" text-anchor="middle" class="group-title">2.4 Payment Processing</text>
  <rect x="802" y="660" width="296" height="32" class="subbox"/>
  <text x="950" y="681" text-anchor="middle" class="subproc">2.4.1 Initiate Khalti Payment</text>
  <rect x="802" y="704" width="296" height="32" class="subbox"/>
  <text x="950" y="725" text-anchor="middle" class="subproc">2.4.2 Verify Callback &amp; Lookup</text>
  <rect x="802" y="748" width="296" height="32" class="subbox"/>
  <text x="950" y="769" text-anchor="middle" class="subproc">2.4.3 Save Payment Result &amp; Receipt</text>

  <rect x="770" y="810" width="360" height="52" class="store"/>
  <text x="950" y="842" text-anchor="middle" class="store-label">D4 - Payment Data</text>

  <rect x="1210" y="610" width="360" height="180" class="group"/>
  <text x="1390" y="640" text-anchor="middle" class="group-title">2.6 Credit &amp; Analytics</text>
  <rect x="1242" y="660" width="296" height="32" class="subbox"/>
  <text x="1390" y="681" text-anchor="middle" class="subproc">2.6.1 Record Credit Transactions</text>
  <rect x="1242" y="704" width="296" height="32" class="subbox"/>
  <text x="1390" y="725" text-anchor="middle" class="subproc">2.6.2 Generate Sales / Order Reports</text>
  <rect x="1242" y="748" width="296" height="32" class="subbox"/>
  <text x="1390" y="769" text-anchor="middle" class="subproc">2.6.3 Prepare Low-Stock Analytics</text>

  <rect x="1210" y="810" width="360" height="52" class="store"/>
  <text x="1390" y="842" text-anchor="middle" class="store-label">D6 - Credit &amp; Analytics Data</text>

  <path d="M 880 162 L 880 185 L 510 185 L 510 205" class="flow"/>
  <text x="670" y="178" text-anchor="middle" class="line-label">user management requests</text>

  <path d="M 950 162 L 950 205" class="flow"/>
  <text x="1010" y="188" class="line-label">catalog and stock updates</text>

  <path d="M 1020 162 L 1020 185 L 1390 185 L 1390 205" class="flow"/>
  <text x="1225" y="178" text-anchor="middle" class="line-label">delivery operations rules</text>

  <path d="M 1070 162 L 1070 575 L 1390 575 L 1390 610" class="flow"/>
  <text x="1240" y="566" text-anchor="middle" class="line-label">analytics and credit requests</text>

  <path d="M 260 528 L 300 528 L 300 280 L 330 280" class="flow"/>
  <text x="174" y="518" text-anchor="middle" class="line-label">register / login / profile</text>

  <path d="M 260 545 L 290 545 L 290 350 L 770 350" class="flow"/>
  <text x="520" y="334" text-anchor="middle" class="line-label">browse, search, product detail</text>

  <path d="M 260 562 L 300 562 L 300 700 L 330 700" class="flow"/>
  <text x="190" y="598" text-anchor="middle" class="line-label">cart, checkout, order request</text>

  <path d="M 330 742 L 290 742 L 290 910 L 150 910 L 150 582" class="flow"/>
  <text x="310" y="902" text-anchor="middle" class="line-label">order confirmation and cart status</text>

  <path d="M 690 280 L 720 280 L 720 700 L 330 700" class="flow"/>
  <text x="704" y="496" text-anchor="end" class="line-label">validated customer session</text>

  <path d="M 770 320 L 730 320 L 730 725 L 690 725" class="flow"/>
  <text x="742" y="716" text-anchor="middle" class="line-label">stock and price validation</text>

  <path d="M 690 700 L 770 700" class="flow"/>
  <text x="730" y="690" text-anchor="middle" class="line-label">payment request</text>

  <path d="M 1130 655 L 1170 655 L 1170 320 L 1210 320" class="flow"/>
  <text x="1190" y="642" class="line-label">paid order for dispatch</text>

  <path d="M 1130 280 L 1210 280" class="flow"/>
  <text x="1170" y="270" text-anchor="middle" class="line-label">stock-ready items</text>

  <path d="M 1130 745 L 1170 745 L 1170 700 L 1210 700" class="flow"/>
  <text x="1190" y="736" class="line-label">payment outcomes for reports</text>

  <path d="M 1130 350 L 1160 350 L 1160 655 L 1210 655" class="flow"/>
  <text x="1182" y="610" class="line-label">product and stock analytics</text>

  <path d="M 1570 300 L 1610 300 L 1610 528 L 1640 528" class="flow"/>
  <text x="1608" y="290" text-anchor="end" class="line-label">assigned deliveries</text>

  <path d="M 1640 560 L 1605 560 L 1605 350 L 1570 350" class="flow"/>
  <text x="1600" y="550" text-anchor="end" class="line-label">status updates</text>

  <path d="M 570 385 L 570 405" class="store-flow"/>
  <path d="M 950 385 L 950 405" class="store-flow"/>
  <path d="M 1390 385 L 1390 405" class="store-flow"/>
  <path d="M 510 790 L 510 810" class="store-flow"/>
  <path d="M 950 790 L 950 810" class="store-flow"/>
  <path d="M 1390 790 L 1390 810" class="store-flow"/>

  <text x="604" y="399" class="line-label">store user data</text>
  <text x="988" y="399" class="line-label">store product records</text>
  <text x="1426" y="399" class="line-label">store delivery data</text>
  <text x="556" y="804" class="line-label">store order data</text>
  <text x="994" y="804" class="line-label">store payment data</text>
  <text x="1426" y="804" class="line-label">store analytics data</text>

  <path d="M 950 862 L 950 1088" class="flow"/>
  <text x="1082" y="1052" text-anchor="middle" class="line-label">payment initiation and callback result</text>
</svg>
